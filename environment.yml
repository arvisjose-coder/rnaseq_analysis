name: rnaseq_env
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - fastqc=0.12.1
  - multiqc
  - trim-galore
  - hisat2=2.2.1
  - samtools=1.17
  - subread
  - stringtie
  - htseq
  - rseqc
  - ucsc-gtftogenepred
  - ucsc-genepredtobed
  - r-base=4.3.1
  - r-essentials
  - bioconductor-deseq2
  - bioconductor-edger
  - r-ggplot2
  - r-dplyr
  - r-pheatmap
  - r-ggrepel
  - bioconductor-enhancedvolcano
  - jupyter
  - ipykernel
  - r-irkernel
  - pip
  - pip:
    - pandas
    - matplotlib
    - seaborn
